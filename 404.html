<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>FocusTube</title>
    <script>
        var l = window.location;
        var base = '/FocusTube/';
        var path = l.pathname.replace(base, '');
        l.replace(base + '?p=' + encodeURIComponent(path) + '&q=' + encodeURIComponent(l.search) + l.hash);
    </script>
</head>
<body></body>
</html>
