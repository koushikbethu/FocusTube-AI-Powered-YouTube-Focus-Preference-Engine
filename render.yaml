services:
  - type: web
    name: focustube-backend
    env: python
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: YOUTUBE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: focustube-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://koushikbethu.github.io/FocusTube
      - key: DEBUG
        value: false

databases:
  - name: focustube-db
    databaseName: focustube
    user: focustube
    region: oregon
